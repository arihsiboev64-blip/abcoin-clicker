<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABcoin Kombat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <span id="username">Игрок</span>
            <div class="league">💎 Алмазная Лига</div>
        </div>
        <div class="balance-container">
            <h1 id="balance">0</h1>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Gold_Coin_Icon.png" id="main-coin" class="coin">
        <div class="stats">
            <p>Энергия: <span id="energy">1000 / 1000</span></p>
        </div>
        <div class="shop">
            <button id="buy-upgrade">Улучшить клик (100 монет)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
