<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABcoin Kombat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем библиотеку Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель -->
        <div class="header">
            <div class="user-info">
                <span id="username">Шахтер</span>
            </div>
            <div class="league">💎 Алмазная Лига</div>
        </div>

        <!-- Баланс -->
        <div class="balance-container">
            <img src="https://cdn-icons-png.flaticon.com/512/6594/6594389.png" alt="coin" class="coin-icon">
            <h1 id="balance">0</h1>
        </div>

        <!-- Зона для клика (Монета/Блок) -->
        <div class="clicker-zone">
            <!-- Замени URL картинки на любой блок из Майнкрафта или свой логотип -->
            <img src="https://cdn-icons-png.flaticon.com/512/8208/8208851.png" id="main-coin" alt="Tap">
        </div>

        <!-- Энергия -->
        <div class="energy-container">
            <span>⚡ <span id="energy">1000</span> / 1000</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
